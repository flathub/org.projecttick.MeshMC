name: Check for updates
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:
jobs:
  flatpak-external-data-checker:
    runs-on: ubuntu-latest
    if: github.repository_owner == 'flathub'
    strategy:
      matrix:
        branch: [ master, beta ]
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ matrix.branch }}
      - uses: docker://ghcr.io/flathub/flatpak-external-data-checker:latest
        env:
          GIT_AUTHOR_NAME: Project Tick Bot
          GIT_COMMITTER_NAME: Project Tick Bot
          GIT_AUTHOR_EMAIL: bot@projecttick.org
          GIT_COMMITTER_EMAIL: bot@projecttick.org
          EMAIL: bot@projecttick.org
          GITHUB_TOKEN: ${{ secrets.BOT_TOKEN }}
        with:
          args: --update --never-fork --pr-labels="${{ matrix.branch == 'master' && '1. Stable' || '1. Beta' }}" org.projecttick.MeshMC.yml

