id: org.projecttick.MeshMC
runtime: org.kde.Platform
runtime-version: '6.10'
sdk: org.kde.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.openjdk17

command: meshmc
finish-args:
  - --share=ipc
    # Only x11 fixes to minecraft launch problems
  - --socket=x11
    # This one needs for some mods to enable support controllers and more.
  - --device=all
    # MeshMC needs network access because download Minecraft from Mojang
  - --share=network
    # Need for voice
  - --socket=pulseaudio
    # for Discord RPC mods
  - --filesystem=xdg-run/app/com.discordapp.Discord:create
    # Mod drag&drop
  - --filesystem=xdg-download:ro
    # FTBApp import
  - --filesystem=~/.ftba:ro
    # Userspace visibility for manual hugepages configuration
    # Required for -XX:+UseLargePages
  - --filesystem=/sys/kernel/mm/hugepages:ro
    # Userspace visibility for transparent hugepages configuration
    # Required for -XX:+UseTransparentHugePages
  - --filesystem=/sys/kernel/mm/transparent_hugepage:ro
    # Apply java for MeshMC installation
  - --env=JAVA_HOME=/usr/lib/sdk/openjdk17/jvm/openjdk-17
  - --env=PATH=/usr/lib/sdk/openjdk17/jvm/openjdk-17/bin:/app/bin:/usr/bin
cleanup:
  - /include
  - /lib/cmake
  - /lib/pkgconfig
  - '*.a'
  - /bin/xkeystone
  - /mesa-demos
  - /share/man

modules:
  # Text to Speech in the game
  # /w patch for pipewire
  # upstream appears inactive keeping a local patch for now
  # may consider maintaining a fork if upstream does not move
  - name: flite
    config-opts:
      - --enable-shared
      - --with-audio=pulseaudio
    no-parallel-make: true
    sources:
      - type: git
        url: https://github.com/festvox/flite.git
        tag: v2.2
        commit: e9e2e37c329dbe98bfeb27a1828ef9a71fa84f88
      - type: patch
        path: patches/0001-Ez-peazy.flite.patch

  # This one is helper of Launching Minecraft.
  # wayland related patches applied locally
  # these are minimal and currently not upstreamed
  - name: glfw
    buildsystem: cmake-ninja
    config-opts:
      - -DCMAKE_BUILD_TYPE=RelWithDebInfo
      - -DBUILD_SHARED_LIBS:BOOL=ON
      - -DGLFW_BUILD_WAYLAND:BOOL=ON
      - -DGLFW_BUILD_DOCS:BOOL=OFF
    sources:
      - type: git
        url: https://github.com/glfw/glfw.git
        commit: 7b6aead9fb88b3623e3b3725ebb42670cbe4c579 # 3.4
      - type: patch
        path: patches/0001-Wayland-Partially-implement-glfwSetCursorPos.patch
      - type: patch
        path: patches/0002-Wayland-Implement-glfwSetWindowIcon.patch
      - type: patch
        path: patches/0003-proceed-even-though-no-window-icon-support-on-waylan.patch

  # This one is need for scanning resolutions from Minecraft.
  - name: xrandr
    buildsystem: autotools
    sources:
      - type: archive
        url: https://xorg.freedesktop.org/archive/individual/app/xrandr-1.5.4.tar.xz
        sha256: 2cafccb2aaf2491a4068676117a0d4f90ab307724b96fffc54cd1da953779400
        x-checker-data:
          type: anitya
          project-id: 14957
          stable-only: true
          url-template: https://xorg.freedesktop.org/archive/individual/app/xrandr-$version.tar.xz

  # This one needs for scanning OpenGL information from Minecraft.
  - name: glxinfo
    buildsystem: meson
    config-opts:
      - --bindir=/app/mesa-demos
      - -Degl=disabled
      - -Dglut=disabled
      - -Dosmesa=disabled
      - -Dvulkan=disabled
      - -Dwayland=disabled
    post-install:
      - mv -v /app/mesa-demos/glxinfo /app/bin
    sources:
      - type: archive
        url: https://archive.mesa3d.org/demos/mesa-demos-9.0.0.tar.xz
        sha256: 3046a3d26a7b051af7ebdd257a5f23bfeb160cad6ed952329cdff1e9f1ed496b
        x-checker-data:
          type: anitya
          project-id: 16781
          stable-only: true
          url-template: https://archive.mesa3d.org/demos/mesa-demos-$version.tar.xz
    cleanup:
      - /share
    modules:
      - shared-modules/glu/glu-9.json

  - name: gamemode
    buildsystem: meson
    config-opts:
      - -Dwith-sd-bus-provider=no-daemon
      - -Dwith-examples=false
    post-install:
      # gamemoderun is installed for users who want to use wrapper commands
      # post-install is running inside the build dir, we need it from the source though
      - install -Dm755 ../data/gamemoderun -t /app/bin
    sources:
      - type: archive
        dest-filename: gamemode.tar.gz
        url: https://api.github.com/repos/FeralInteractive/gamemode/tarball/1.8.2
        sha256: 2886d4ce543c78bd2a364316d5e7fd59ef06b71de63f896b37c6d3dc97658f60
        x-checker-data:
          type: json
          url: https://api.github.com/repos/FeralInteractive/gamemode/releases/latest
          version-query: .tag_name
          url-query: .tarball_url
          timestamp-query: .published_at

  - name: tomlplusplus
    buildsystem: cmake-ninja
    builddir: true
    config-opts:
      - -DCMAKE_BUILD_TYPE=RelWithDebInfo
      - -DTOMLPLUSPLUS_BUILD_TESTS=OFF
      - -DTOMLPLUSPLUS_BUILD_EXAMPLES=OFF
    sources:
      - type: archive
        url: https://ftp.projecttick.org/Project-Tick/tomlplusplus/releases/download/v202604292150/tomlplusplus-v202604292150.tar.gz
        sha256: a3f4ca57fb9b75f63a04cb0013abb7ba89a10eeb283888c397eb3822e4577fca
        x-checker-data:
          type: json
          url: https://ftp.projecttick.org/Project-Tick/latest.json
          version-query: .stable.release_tag
          url-query: .stable.downloads.tomlplusplus.files[] | select(.name == "tomlplusplus-"
            + $version + ".tar.gz") | .url

  # Main program
  - name: meshmc
    buildsystem: cmake-ninja
    builddir: true
    config-opts:
      - -DMeshMC_BUILD_PLATFORM=flatpak
      # This allows us to manage and update Java independently of this Flatpak
      - -DMeshMC_DISABLE_JAVA_DOWNLOADER=OFF
      # This allows to build MeshMC in tree plugins
      - -DMeshMC_PLUGINS=ON
      - -DMeshMC_STAGING_PLUGINS=ON
      - -DCMAKE_BUILD_TYPE=RelWithDebInfo
      # Diff for MeshMC: Removed _FORTIFY_SOURCE Macro and this suppress warnings
      - -DCMAKE_CXX_FLAGS=-pedantic -fstack-protector-strong --param=ssp-buffer-size=4
        -O3
      - -DBUILD_TESTING=OFF
    build-options:
      env:
        JAVA_HOME: /usr/lib/sdk/openjdk17/jvm/openjdk-17
        JAVA_COMPILER: /usr/lib/sdk/openjdk17/jvm/openjdk-17/bin/javac
    post-install:
      - install -Dm755 ../prime-run /app/bin/prime-run
      - mv /app/bin/meshmc /app/bin/meshmcrun
      - install -Dm755 ../meshmc /app/bin/meshmc
      - /usr/lib/sdk/openjdk17/installjdk.sh
    sources:
      - type: archive
        url: https://ftp.projecttick.org/Project-Tick/meshmc/releases/download/v202604292150/meshmc-v202604292150.tar.gz
        sha256: a046047804d97423ed7c9caa6cf3fc404560ca3d8460b26cf83a5655462f7b94
        x-checker-data:
          type: json
          url: https://ftp.projecttick.org/Project-Tick/latest.json
          version-query: .beta.release_tag
          url-query: .beta.downloads.meshmc.files[] | select(.name == "meshmc-"
            + $version + ".tar.gz") | .url
      # Required for running Minecraft on NVIDIA Optimus systems.
      # Will be integrated directly into the launcher in the future.
      - type: file
        path: prime-run
      # Wrapper script for need discord, mangohud and more.
      - type: file
        path: meshmc
